services:
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    command: server /data --console-address ":9001"

  python-compute:
    image: python:3.9
    container_name: python_compute
    working_dir: /app
    volumes:
      - .:/app
    command: tail -f /dev/null